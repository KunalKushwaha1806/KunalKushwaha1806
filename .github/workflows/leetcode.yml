name: Update LeetCode Stats

on:
schedule:
- cron: "0 */12 * * *"
workflow_dispatch:

permissions:
contents: write

jobs:
update:
runs-on: ubuntu-latest

```
steps:
  - uses: actions/checkout@v4

  - name: Update README
    run: |
      python << 'EOF'
      import json
      import re
      import urllib.request

      username = "kunalkushwaha1806"

      payload = {
          "query": """
          query userProblemsSolved($username: String!) {
            matchedUser(username: $username) {
              submitStatsGlobal {
                acSubmissionNum {
                  difficulty
                  count
                }
              }
            }
          }
          """,
          "variables": {"username": username}
      }

      req = urllib.request.Request(
          "https://leetcode.com/graphql",
          data=json.dumps(payload).encode(),
          headers={"Content-Type": "application/json"}
      )

      data = json.loads(
          urllib.request.urlopen(req).read().decode()
      )

      stats = data["data"]["matchedUser"]["submitStatsGlobal"]["acSubmissionNum"]

      total = stats[0]["count"]
      easy = stats[1]["count"]
      medium = stats[2]["count"]
      hard = stats[3]["count"]

      with open("README.md", "r", encoding="utf-8") as f:
          content = f.read()

      content = re.sub(
          r'<!-- LC_TOTAL -->.*?<!-- LC_TOTAL -->',
          f'<!-- LC_TOTAL -->{total}<!-- LC_TOTAL -->',
          content
      )

      content = re.sub(
          r'<!-- LC_EASY -->.*?<!-- LC_EASY -->',
          f'<!-- LC_EASY -->{easy}<!-- LC_EASY -->',
          content
      )

      content = re.sub(
          r'<!-- LC_MEDIUM -->.*?<!-- LC_MEDIUM -->',
          f'<!-- LC_MEDIUM -->{medium}<!-- LC_MEDIUM -->',
          content
      )

      content = re.sub(
          r'<!-- LC_HARD -->.*?<!-- LC_HARD -->',
          f'<!-- LC_HARD -->{hard}<!-- LC_HARD -->',
          content
      )

      with open("README.md", "w", encoding="utf-8") as f:
          f.write(content)

      print("README updated")
      EOF

  - name: Commit changes
    run: |
      git config user.name github-actions
      git config user.email github-actions@github.com

      git add README.md

      git diff --staged --quiet || git commit -m "Update LeetCode stats"

      git push
```
